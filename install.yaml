- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true

- link:
    ~/.zshrc:
      relink: true
      force: true
      path: shell/zsh/zshrc
    ~/.zlogin:
      relink: true
      force: true
      path: shell/zsh/zlogin
    ~/.zprofile:
      relink: true
      force: true
      path: shell/zsh/zprofile
    ~/.zshenv:
      relink: true
      force: true
      path: shell/zsh/zshenv

    ~/.ssh/config:
      create: true
      force: true
      relink: true
      path: config/ssh/config

    ~/.config/:
      glob: true
      relink: true
      path: config/*
      exclude:
        [
          config/bat,
          config/curl,
          config/codium,
          config/eza,
          config/firefox,
          config/gnupg,
          config/iina,
          config/lscolors,
          config/lsd,
          config/mpv-1,
          config/mpv-2,
          config/mpv-3,
          config/ssh,
          config/transmission,
          config/weechat,
          config/wget,
          config/yt,
        ]

    ~/.gnupg/gpg.conf:
      create: true
      force: true
      relink: true
      path: config/gnupg/gpg.conf
    ~/.gnupg/gpg-agent.conf:
      create: true
      force: true
      relink: true
      path: config/gnupg/gpg-agent.conf

    /opt/homebrew/var/transmission/settings.json:
      create: true
      relink: true
      path: config/transmission/settings.json

    /Applications/codium-portable-data/user-data/User/settings.json:
      create: true
      glob: true
      relink: true
      force: true
      path: config/codium/settings.json
    /Applications/codium-portable-data/user-data/User/keybindings.json:
      create: true
      glob: true
      relink: true
      force: true
      path: config/codium/keybindings.json
    /Applications/codium-portable-data/user-data/User/snippets:
      create: true
      glob: true
      relink: true
      force: true
      path: config/codium/snippets/*

    ~/Library/Application Support/Firefox/Profiles/18jwsaux.default-release/chrome/:
      create: true
      glob: true
      relink: true
      path: config/firefox/chrome/*

- create:
    - ~/.cache/zsh
    - ~/Developer/plugins
    - ~/Developer/repos
    - ~/Developer/scripts
    - ~/Developer/served

