import = ["~/.dotfiles/config/alacritty/themes/themes/one_dark.toml"]

# [shell]
# program = "tmux"
# args = ["-u", "new-session", "-A", "-s", "Main"]

[window]
option_as_alt = "Both"
padding = { x = 5, y = 5 }
opacity = 0.99
dynamic_padding = true
decorations = "buttonless"

[scrolling]
history = 10000
multiplier = 1

[env]
EDITOE = "nvim"
TERM = "xterm-256color"

[font]
size = 14

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.bold]
family = "FiraCode Nerd Font"
style = "SemiBold"

[cursor]
style = "Beam"
 
[keyboard]
bindings = [
    { key = "N", mods = "Command", action = "CreateNewWindow" },
