###########
# GPU API # 
###########
# Controls which type of graphics APIs will be accepted, switch to "d3d11" (on Windows) or "opengl" if you have issues
# Uncomment one API only

###### Vulkan Linux, Windows (preferred)
# gpu-api=vulkan

###### DirectX on Windows
# gpu-api=d3d11

###### OpenGL on Linux or macOS or Windows
# Note: MacOS devices are currently limited to OpenGL v4.1 (which is deprecated). For iOS/tvOS/MacOS devices, Metal v2 would be preferred but there is not currently a Metal backend. In the future, a workaround may be to use mpv + libplacebo + MoltenVK
gpu-api=opengl

##########
# Player #
##########

#input-ipc-server=/tmp/mpvsocket
hr-seek-framedrop=no
no-resume-playback
# border=no				# recommended for ModernX OSC
msg-color=yes
msg-module=yes

###### General
# fullscreen=yes			# Always open the video player in full screen
# keep-open=yes				# Don't close the player after finishing the video
autofit=85%x85%				# Start mpv with a % smaller resolution of your screen
cursor-autohide=100			# Cursor hide in ms

###############
# Screenshots #
###############

screenshot-template="%x/Screens/Screenshot-%F-T%wH.%wM.%wS.%wT-F%{estimated-frame-number}"
screenshot-format=png					# Set screenshot format
screenshot-png-compression=4			# Range is 0 to 10. 0 being no compression.
screenshot-tag-colorspace=yes
screenshot-high-bit-depth=yes			# Same output bitdepth as the video

###########
# OSC/OSD #
###########

osc=no						# 'no' required for MordernX OSC
osd-bar=yes					# Do not remove/comment if mpv_thumbnail_script_client_osc.lua is being used.
osd-font='Inter Tight Medium'			# Set a font for OSC
osd-font-size=30				# Set a font size
osd-color='#CCFFFFFF'				# ARGB format
osd-border-color='#DD322640'			# ARGB format
osd-bar-align-y=-1				# progress bar y alignment (-1 top, 0 centered, 1 bottom)
osd-border-size=2				# size for osd text and progress bar
osd-bar-h=1					# height of osd bar as a fractional percentage of your screen height
osd-bar-w=60					# width of " " "

########
# Subs #
########

blend-subtitles=no
sub-ass-vsfilter-blur-compat=yes		# Backward compatibility for vsfilter fansubs
sub-ass-scale-with-window=no			# May have undesired effects with signs being misplaced.
sub-auto=fuzzy                         		# external subs don't have to match the file name exactly to autoload
# sub-gauss=0.6					# Some settings fixing VOB/PGS subtitles (creating blur & changing yellow subs to gray)
sub-file-paths-append=ass               	# search for external subs in these relative subdirectories
sub-file-paths-append=srt
sub-file-paths-append=sub
sub-file-paths-append=subs
sub-file-paths-append=subtitles
demuxer-mkv-subtitle-preroll=yes       		# try to correctly show embedded subs when seeking
embeddedfonts=yes				# use embedded fonts for SSA/ASS subs
sub-fix-timing=no                       	# do not try to fix gaps (which might make it worse in some cases). Enable if there are scenebleeds.

# Subs - Forced # 

sub-font=Open Sans SemiBold
sub-font-size=46
sub-blur=0.3
sub-border-color=0.0/0.0/0.0/0.8
sub-border-size=3.2
sub-color=0.9/0.9/0.9/1.0
sub-margin-x=100
sub-margin-y=50
sub-shadow-color=0.0/0.0/0.0/0.25
sub-shadow-offset=0

#########
# Audio #
#########

ao=coreaudio
audio-stream-silence                    # fix audio popping on random seek
audio-file-auto=fuzzy                   # external audio doesn't has to match the file name exactly to autoload
audio-pitch-correction=yes              # automatically insert scaletempo when playing with higher speed

# Languages #
alang=jpn,jp,eng,en,enUS,en-US,de,ger		# Audio language priority
slang=eng,en,und,de,ger,jp,jap 			# Subtitle language priority

### Resampling Profiles ###

[ww-audio-resample-no]                        # Section: No resampling
profile-desc="WW - Audio - Resample - No"
audio-samplerate=0                           # Don't alter source sample rate
audio-swresample-o-append=resampler=swr      # Use swr for resampling

[ww-audio-resample-44]
profile-desc="WW - Audio - Resample - SOXR 44KHz"
audio-format=float
audio-samplerate=44100
audio-swresample-o-append=resampler=soxr

[ww-audio-resample-48]
profile-desc="WW - Audio - Resample - SOXR 48KHz"
audio-format=float
audio-samplerate=48000
audio-swresample-o-append=resampler=soxr

[ww-audio-resample-96]
profile-desc="WW - Audio - Resample - SOXR 96KHz"
audio-format=float
audio-samplerate=96000
audio-swresample-o-append=resampler=soxr

##################
# Video Profiles #
##################

profile=high-quality			# mpv --show-profile=gpu-hq
vo=gpu-next
gpu-context=macvk
macos-force-dedicated-gpu=yes	# deactivates the automatic graphics switching and forces the dedicated GPU.
# hwdec=auto-copy-safe		# enable hardware decoding, defaults to 'no'

# OpenGL settings
opengl-pbo=yes

###### Dither
dither-depth=auto

fbo-format=rgba16f		# use with gpu-api=opengl
# fbo-format=rgba16hf		# use with gpu-api=vulkan
# fbo-format is not not supported in gpu-next profile
glsl-shaders-clr

# luma upscaling
scale=ewa_lanczossharp    # not supported in gpu-next

# luma downscaling
dscale=catmull_rom
linear-downscaling=no

# chroma upscaling and downscaling
cscale=lanczos
sigmoid-upscaling=yes

###### Debanding 
deband=yes
deband-iterations=1
deband-threshold=20
deband-range=16

###### Antiring
scale-antiring=0.7
dscale-antiring=0.7
cscale-antiring=0.7

###### Interpolation
video-sync=display-resample
interpolation=yes
tscale=box
tscale-window=quadric
tscale-radius=1.1
tscale-clamp=0.0

tone-mapping=hable
hdr-compute-peak=yes

target-prim=apple

# Scaler Comparison: https://artoriuz.github.io/blog/mpv_upscaling.html

# Built-in Profiles (mpv --show-profile=high-quality):

[fast]
scale=bilinear                                # Fastest, low quality upscaling
cscale=(scale)                                # Input color scaling matches luma upscaler
dscale=bilinear                               # Downscale: bilinear filter
dither=no                                     # No dither
correct-downscaling=no                        # No advanced downscaling correction
linear-downscaling=no                         # Don’t use linear filter for downscaling
sigmoid-upscaling=no                          # No sigmoid for upscaling
hdr-compute-peak=no                           # Don’t compute HDR peaks
allow-delayed-peak-detect=yes                 # Allow delayed peak detection for HDR

[default] # (implicit mpv defaults)
scale=lanczos
cscale=(scale)
dscale=hermite
deband=no
dither-depth=auto
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes
hdr-compute-peak=yes

[high-quality] # (inherits default options)
scale=ewa_lanczossharp
cscale=(scale)
hdr-peak-percentile=99.995
hdr-contrast-recovery=0.30

[mpv-gpu-default]
profile-desc="MPV - Video - Defaults (Copied)"
scale=lanczos
cscale=lanczos
dscale=hermite
deband=yes #
dither-depth=no #
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes
hdr-compute-peak=no  # Unsupported on macOS

[ww-video-low]
profile-desc="WW - Video - High Performance"
profile=fast
deband-iterations=1
cscale=bilinear
script-opts-append=Shaders-enabled=no

[ww-video-mid]
profile-desc="WW - Video - Mid Quality"
profile=mpv-gpu-default
deband-iterations=2
dscale=lanczos
script-opts-append=Shaders-enabled=no

[ww-video-high-quality]
profile-desc="WW - Video - Base High Quality"
profile=ww-video-mid,high-quality
deband-iterations=3
scale=ewa_lanczos4sharpest
cscale=ewa_lanczos4sharpest
dscale=lanczos

[ww-video-high]
profile-desc="WW - Video - High Quality"
profile=ww-video-high-quality
script-opts-append=Shaders-enabled=no

[ww-video-max]
profile-desc="WW - Video - Max Quality"
profile=ww-video-high-quality
script-opts-append=Shaders-enabled=yes

### Video - OS Specifics

[ww-video-mac]
profile-desc="WW - OS Settings - Mac"
profile=ww-audio-resample-96,ww-video-mid
hwdec=videotoolbox        # Use videotoolbox for hardware acceleration
audio-channels=stereo     # M1 generally defaults to stereo for laptop speakers

[ww-video-win]
profile-desc="WW - Video - OS Settings - Windows"
ao=auto
vo=auto
hwdec=auto-copy-safe

[ww-video-nix]
profile-desc="WW - Video - OS Settings - *nix"
ao=auto
vo=auto
hwdec=auto-copy-safe

[ww-video-mac-gl]
profile-desc="WW - Video - OS Settings - Mac libmpv"
ao=coreaudio
vo=libmpv
gpu-api=auto
gpu-context=auto
hwdec=videotoolbox-copy

[ww-video-mac-vk]
profile-desc="WW - Video - OS Settings - Mac Vulkan"
#ao=avfoundation
ao=coreaudio
vo=gpu-next
gpu-api=vulkan
gpu-context=macvk
hwdec=videotoolbox-copy

#####################
# Hardware Profiles #
#####################

[ww-win]
profile-desc="WW - OS Settings - Windows"
profile=ww-audio-resample-no,ww-video-mid,ww-video-win

[ww-nix]
profile-desc="WW - OS Settings - *nix"
profile=ww-audio-resample-no,ww-video-mid,ww-video-nix

[ww-mac]
profile-desc="WW - OS Settings - Mac"
profile=ww-audio-resample-96,ww-video-mid,ww-video-mac-gl
ytdl-raw-options-append=format-sort=height:2160

[ww-mini]
profile-desc="WW - Host Settings - Mini 2021"
profile=ww-audio-resample-96,ww-video-max,ww-video-mac-vk
script-opts-append=osc-barmargin=39
ytdl-raw-options-append=format-sort=height:2160

[ww-plex-mid]
profile-desc="WW - Plex Settings - Mid Quality"
profile=ww-audio-resample-no,ww-video-mid,ww-video-mac

[ww-plex-high]
profile-desc="WW - Plex Settings - High Quality"
profile=ww-audio-resample-no,ww-video-high,ww-video-mac

########
# ytdl #
########

ytdl=yes
ytdl-raw-options-append=config-location=~/.dotfiles/config/yt-dlp/yt-dlp.conf  # Points youtube-dl options to use custom config

############
# Playback #
############

deinterlace=no # global reset of deinterlacing to off

[default]
# apply all luma and chroma upscaling and downscaling settings
# apply motion interpolation

[protocol.http]
hls-bitrate=max # use max quality for HLS streams
cache=yes
no-cache-pause # don't pause when the cache runs low

[protocol.https]
profile=protocol.http

[protocol.ytdl]
profile=protocol.http
