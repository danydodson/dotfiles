#  yt.conf

# Download Settings
# =================
#--quiet                     # Suppresses output messages except errors.
#--progress                  # Shows download progress, if not quiet.

--paths home:"~/Public/web/" # Sets the download directory.
# --paths temp:"~/Public/web/tmp/"  # Sets a temporary download directory.

--format "bestvideo+bestaudio/best" # Downloads the best available quality by merging best video and best audio.
--output "~/Public/web/%(title)s.%(ext)s" # Sets the output filename and location using metadata.

--extractor-retries 4        # Number of retries for extracting info.
--file-access-retries 4      # Number of retries for accessing files.
--fragment-retries 4         # Number of retries for downloading fragments.
--retries 4                  # Total number of retries for download attempts.
--retry-sleep extractor:exp=4 # Exponential backoff sleep between extractor retries.
--retry-sleep file_access:exp=4 # Exponential backoff sleep between file access retries.
--retry-sleep fragment:exp=4 # Exponential backoff sleep between fragment retries.
--retry-sleep http:exp=4     # Exponential backoff sleep for HTTP errors.
--retry-sleep exp=4          # General exponential backoff sleep for other retries.

--force-ipv4                 # Forces the use of IPv4 addresses.
--buffer-size 1M             # Sets the buffer size for downloads.
--concurrent-fragments 4     # Number of fragments to download concurrently.
--http-chunk-size 10M        # Size of each chunk in HTTP download.
--socket-timeout 4           # Time before a socket connection times out.
--live-from-start            # While downloading a live video, fetch from start.
--geo-bypass-country US      # Bypass geographic restrictions by simulating this country.
--user-agent "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)"

#--downloader http:aria2c    # Use aria2c for HTTP downloads.
--downloader-args aria2c:"--continue=true --max-concurrent-downloads=8 --max-connection-per-server=8 --split=8 --min-split-size=32M" 
# Passes additional arguments to aria2c for multi-connection downloading.

# Output Settings
# ===============
--windows-filenames                              # Restricts filenames to be compatible with Windows.
--restrict-filenames                             # Only use ASCII characters in filenames.
--merge-output-format mp4/mkv                    # Formats to merge video and audio into.
--remux-video webm>mkv/ogg>mkv/mkv>mkv/mp4>mp4 # Changes the container format without re-encoding.

--convert-thumbnails jpg>jpg/png # Converts thumbnails to these formats.

--audio-multistreams         # Downloads multiple audio streams if available.
--video-multistreams         # Downloads multiple video streams if available.
--check-formats              # Validates that the selected download formats are available.

--embed-chapters             # Embeds chapters into metadata if available.
--sponsorblock-mark all      # Marks sections of sponsor segments using SponsorBlock.

--embed-subs                 # Embeds subtitles as a separate track in the final media file.
--write-auto-subs            # Downloads automatically generated subtitles.
--sub-format ass/srt/best    # Preferred subtitle formats.
--sub-lang en.*,th           # Subtitles languages to download.