#: }}}

#: Scrollback {{{

scrollback_lines 10000000

#: }}}

#: Cursor customization {{{

cursor_shape beam
cursor_beam_thickness 1.5

#: }}}

#: Mouse {{{

url_color #0087bd
url_style curly
copy_on_select a1
map shift+cmd+v paste_from_buffer a1

#: }}}

#: Terminal bell {{{

enable_audio_bell no

#: }}}

#: Window layout {{{

enabled_layouts *
window_padding_width 13
window_border_width 0.5pt
draw_minimal_borders yes
confirm_os_window_close 0
remember_window_size  yes
initial_window_width  80
initial_window_height 30

#: }}}

#: Tab bar {{{

tab_bar_edge bottom
tab_bar_style separator
tab_bar_align center

#: }}}

#: Advanced {{{

startup_session ./startup.conf
shell_integration no-cursor

#: }}}

#: OS specific tweaks {{{

macos_option_as_alt yes
macos_traditional_fullscreen no
macos_titlebar_color system
macos_option_as_alt yes
macos_thicken_font 0
macos_custom_beam_cursor no

#: }}}

#: Window management {{{

map cmd+enter new_window_with_cwd

#: }}}

#: Window Navigation {{{

map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+h neighboring_window left
map kitty_mod+l neighboring_window right

#: }}}

#: Layout management {{{

map ctrl+alt+f goto_layout fat
map ctrl+alt+s goto_layout stack
map ctrl+alt+t goto_layout tall
map ctrl+alt+p last_used_layout
map ctrl+alt+z toggle_layout stack

#: }}}

#: Unicode Symbol Maps {{{

include unicode-symbol-maps.conf

#: }}}

#: Color scheme {{{

background_opacity 1
background_blur 0

#: }}}

#: Miscellaneous {{{

# use cmd+k to clear the terminal
map cmd+k clear_terminal to_cursor active

#: Toggle fullscreen

# map kitty_mod+f11 toggle_fullscreen
map ctrl+cmd+f toggle_fullscreen

#: Reload kitty.conf

# map kitty_mod+f5 load_config_file
map ctrl+cmd+, load_config_file

# map open kitty website
map shift+cmd+/ open_url https://sw.kovidgoyal.net/kitty/ 🍎

#: }}}

# BEGIN_KITTY_THEME
include snazzy.conf
# END_KITTY_THEME
